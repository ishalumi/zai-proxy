name: Build And Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./... -timeout=60s

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package binary
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          BIN_NAME="zai-proxy"
          ARTIFACT_BASE="${BIN_NAME}_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}"

          mkdir -p dist
          BIN_EXT=""
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN_EXT=".exe"
          fi

          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}${BIN_EXT}" .

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && zip -q "${ARTIFACT_BASE}.zip" "${BIN_NAME}${BIN_EXT}")
            PACKAGE_FILE="dist/${ARTIFACT_BASE}.zip"
          else
            tar -C dist -czf "dist/${ARTIFACT_BASE}.tar.gz" "${BIN_NAME}${BIN_EXT}"
            PACKAGE_FILE="dist/${ARTIFACT_BASE}.tar.gz"
          fi

          sha256sum "${PACKAGE_FILE}" > "${PACKAGE_FILE}.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/checksums.txt
